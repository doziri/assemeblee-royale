<script>

// ═══ FORMAT NUMÉRO WHATSAPP ═══
function formatWANumber(tel) {
  if (!tel) return '';
  // Supprimer tous les caractères non numériques sauf le +
  var num = tel.replace(/[^0-9+]/g, '');
  // Supprimer le + du début si présent (wa.me ne veut pas de +)
  num = num.replace(/^\+/, '');
  // Si le numéro commence par 0 (format local), ajouter l'indicatif 225 (Côte d'Ivoire)
  if (num.startsWith('0') && num.length <= 10) {
    num = '225' + num.substring(1);
  }
  // Si le numéro est trop court (moins de 10 chiffres), ajouter 225
  if (num.length <= 10 && !num.startsWith('225')) {
    num = '225' + num;
  }
  return num;
}
// ═══════════════════════════════════════════════════

// ═══ QR CODE - Génération locale avec fallbacks ═══

// QR Code - Version intégrée locale
// Utilise l'API canvas pour générer le QR sans réseau

function afficherQRCode(elId, text, size) {
  var el = document.getElementById(elId);
  if (!el) return;
  size = size || 94;
  el.innerHTML = '';
  
  var cacheKey = 'qrcache_' + btoa(unescape(encodeURIComponent(text))).replace(/[^a-z0-9]/gi,'').slice(0,25);
  
  // 1. Essayer QRCode.toCanvas (qrcode.js depuis CDN)
  if (window.QRCode && typeof QRCode.toCanvas === 'function') {
    var c = document.createElement('canvas');
    c.width = size; c.height = size;
    QRCode.toCanvas(c, text, {
      width: size, margin: 1,
      color: { dark: '#000000', light: '#ffffff' }
    }, function(err) {
      if (!err) {
        el.appendChild(c);
        try { localStorage.setItem(cacheKey, c.toDataURL()); } catch(e){}
      } else { _qrFallback(el, text, size, cacheKey); }
    });
    return;
  }
  
  // 2. QRCode classique (qrcodejs depuis CDN)
  if (window.QRCode && typeof QRCode === 'function') {
    try {
      var d = document.createElement('div');
      el.appendChild(d);
      new QRCode(d, {
        text: text, width: size, height: size,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: (QRCode.CorrectLevel || {}).M || 1
      });
      return;
    } catch(e) {}
  }
  
  _qrFallback(el, text, size, cacheKey);
}

function _qrFallback(el, text, size, cacheKey) {
  // 3. Cache local
  var cached = localStorage.getItem(cacheKey || 'qrcache_'+btoa(unescape(encodeURIComponent(text))).replace(/[^a-z0-9]/gi,'').slice(0,25));
  if (cached && cached.length > 100) {
    el.innerHTML = '<img src="'+cached+'" style="width:'+size+'px;height:'+size+'px;display:block;border-radius:4px;"/>';
    return;
  }
  
  // 4. Plusieurs APIs QR en cascade
  var apis = [
    'https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+encodeURIComponent(text)+'&format=png&margin=1',
    'https://quickchart.io/qr?text='+encodeURIComponent(text)+'&size='+size+'&dark=000000&light=ffffff',
    'https://chart.googleapis.com/chart?chs='+size+'x'+size+'&cht=qr&chl='+encodeURIComponent(text)
  ];
  
  function tryApi(idx) {
    if (idx >= apis.length) {
      // 5. Dernier recours - afficher le code
      var code = text.split('|')[1] || text;
      el.innerHTML = '<div style="width:'+size+'px;height:'+size+'px;background:#1a3a5a;border:2px solid #4eff9b;display:flex;align-items:center;justify-content:center;font-size:12px;color:#4eff9b;text-align:center;font-weight:900;border-radius:6px;padding:4px;">'+code+'</div>';
      return;
    }
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      el.innerHTML = '';
      el.appendChild(img);
      img.style.cssText = 'width:'+size+'px;height:'+size+'px;display:block;border-radius:4px;';
      // Sauvegarder en cache
      try {
        var c = document.createElement('canvas');
        c.width = size; c.height = size;
        var ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        localStorage.setItem(cacheKey, c.toDataURL());
      } catch(e) {}
    };
    img.onerror = function() { tryApi(idx + 1); };
    img.src = apis[idx];
  }
  
  if (navigator.onLine) {
    tryApi(0);
  } else {
    var code = text.split('|')[1] || text;
    el.innerHTML = '<div style="width:'+size+'px;height:'+size+'px;background:#1a3a5a;border:2px solid #4eff9b;display:flex;align-items:center;justify-content:center;font-size:12px;color:#4eff9b;text-align:center;font-weight:900;border-radius:6px;padding:4px;">'+code+'</div>';
  }
}

function afficherQRFallback(el, text, size) {
  _qrFallback(el, text, size, null);
}

// ═══════════════════════════════════════════════════

</script>

var SYNC_INTERVAL = 60000;
var syncTimer = null;

async function jsonbinGet() {
  return new Promise(function(resolve, reject) {
    db.ref('assemblee-royale-data').once('value')
      .then(function(snapshot) {
        var data = snapshot.val();
        if (!data) {
          resolve({membres:[], cfg:{}, comptes:{}, montants:[], logo:null});
        } else {
          // Normaliser tableaux Firebase
          if (data.membres && !Array.isArray(data.membres)) {
            data.membres = Object.values(data.membres);
          }
          if (data.montants && !Array.isArray(data.montants)) {
            data.montants = Object.values(data.montants);
          }
          if (data.comptes && data.comptes.comite && !Array.isArray(data.comptes.comite)) {
            data.comptes.comite = Object.values(data.comptes.comite);
          }
          resolve(data);
        }
      })
      .catch(reject);
  });
}

function setSyncIndicator(etat, msg) {
  var el = document.getElementById('sync-indicator');
  if (!el) return;
  var cls = {ok:'sync-indicator sync-ok', err:'sync-indicator sync-err', loading:'sync-indicator sync-loading'};
  var icons = {ok:'✔', err:'✗', loading:'<span class="spin">⟳</span>'};
  el.className = cls[etat]||cls.loading;
  el.innerHTML = icons[etat]+' '+msg;
}

var MEMBRE_CONNECTE = null;  // membre actuellement connecté
var VUE_ACTUELLE = 'mondossier';
var MODE_DECOUVERTE = false; // accès public sans code

function fmt(v){return new Intl.NumberFormat('fr-FR').format(v)+' F';}
function initiales(n){return n.split(' ').map(function(x){return x[0];}).join('').slice(0,2).toUpperCase();}
function getTousMois(){return Array.from({length:CFG.nb_mois},function(_,i){return MOIS_NOMS[(CFG.mois_debut+i)%12]+' '+(CFG.annee_debut+Math.floor((CFG.mois_debut+i)/12));});}
function getMoisCourantIdx(){var base=CFG.annee_debut*12+CFG.mois_debut,cur=CFG.mois_courant_annee*12+CFG.mois_courant_mois;return Math.max(0,Math.min(cur-base,CFG.nb_mois-1));}
function TOUS_MOIS(){return getTousMois();}
function MOIS_COURANT(){return getMoisCourantIdx();}

function statutMembre(m){
  var p=m.paiements.slice(0,MOIS_COURANT()+1).reduce(function(a,b){return a+b;},0);
  if(p===MOIS_COURANT()+1) return 'ajour';
  if(p===0) return 'inactif';
  return 'retard';
}
function badgeHTML(s){
  var l={ajour:'✔ À jour',retard:'⚠ Retard',inactif:'✗ Inactif'};
  return '<span class="badge badge-'+s+'">'+l[s]+'</span>';
}
function avatarHTML(nom,s){
  var bg={ajour:'var(--vertD)',retard:'var(--orD)',inactif:'var(--rougeD)'};
  var c={ajour:'var(--vert)',retard:'var(--or)',inactif:'var(--rouge)'};
  return '<div style="width:48px;height:48px;border-radius:50%;background:'+bg[s]+';color:'+c[s]+';display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0">'+initiales(nom)+'</div>';
}
function notifier(msg,type){type=type||'success';var n=document.getElementById('notif');n.textContent=msg;n.style.display='block';n.style.background=type==='danger'?'var(--rougeD)':'var(--vertD)';n.style.color=type==='danger'?'var(--rouge)':'var(--vert)';n.style.border='1px solid '+(type==='danger'?'rgba(255,107,107,0.3)':'rgba(78,255,155,0.3)');setTimeout(function(){n.style.display='none';},3000);}

// CHARGEMENT CLOUD
// ══════════════════════════════════════════════════════════
async function chargerDepuisCloud() {
  setSyncIndicator('loading', 'Chargement...');
  try {
    var data = await jsonbinGet();
    if (data.membres && Array.isArray(data.membres)) {
      var nb = (data.cfg && data.cfg.nb_mois) || CFG.nb_mois;
      MEMBRES = data.membres.map(function(m){
        var p = m.paiements || [];
        if (p.length < nb) return Object.assign({}, m, {paiements: p.concat(Array(nb-p.length).fill(0))});
        if (p.length > nb) return Object.assign({}, m, {paiements: p.slice(0, nb)});
        return m;
      });
    }
    if (data.cfg) CFG = Object.assign({}, CFG_DEF, data.cfg);
    if (data.logo) { LOGO_DATA = data.logo; } else { LOGO_DATA = LOGO_DATA_DEFAULT; } mettreAJourLogoUI();
    setSyncIndicator('ok', 'À jour');
    mettreAJourHeader();
    return true;
  } catch(e) {
    setSyncIndicator('err', 'Hors ligne');
    return false;
  }
}

function demarrerSyncAuto() {
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(function(){
    chargerDepuisCloud().then(function(){ if(document.getElementById('header').style.display!=='none') afficherVue(); });
  }, SYNC_INTERVAL);
}

function mettreAJourLogoUI() {
  var src = LOGO_DATA || LOGO_DATA_DEFAULT;
  var wrap = document.getElementById('header-logo-wrap');
  var login = document.getElementById('login-logo-display');
  if (src) {
    if (wrap) wrap.innerHTML = '<img src="'+src+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px"/>';
    if (login) login.innerHTML = '<img src="'+src+'" style="width:100%;height:100%;object-fit:cover;border-radius:16px"/>';
  }
}

function mettreAJourHeader() {
  var titre = document.getElementById('header-title');
  var sub = document.getElementById('header-sub');
  var orgName = document.getElementById('login-org-name');
  if (titre) titre.textContent = CFG.nom_eglise + ' – Espace Membres';
  if (sub && MEMBRE_CONNECTE) sub.textContent = MEMBRE_CONNECTE.nom + ' · ' + MEMBRE_CONNECTE.id;
  else if (sub && MODE_DECOUVERTE) sub.textContent = MEMBRES.length + ' membres · Accès public';
  if (orgName) orgName.textContent = (CFG.nom_eglise||'Temple').toUpperCase() + ' – ESPACE MEMBRES';
  document.title = '⛪ '+CFG.nom_eglise+' – Espace Membres';
}

async function tentativeConnexionMembre() {
  var code = (document.getElementById('login-code').value||'').trim().toUpperCase();
  var tel  = (document.getElementById('login-tel').value||'').trim().replace(/\s/g,'');
  var errEl = document.getElementById('login-err');

  if (!code) { showErr(errEl, 'Veuillez saisir votre code membre.'); return; }

  // Charger données
  setSyncIndicator('loading','Vérification...');
  var ok = await chargerDepuisCloud();

  var membre = MEMBRES.find(function(m){ return m.id === code; });
  if (!membre) { showErr(errEl, 'Code membre introuvable : ' + code); setSyncIndicator('err','Inconnu'); return; }

  // Vérif numéro si renseigné
  if (membre.tel && tel) {
    var telMembre = membre.tel.replace(/\D/g,'');
    var telSaisi  = tel.replace(/\D/g,'');
    if (telMembre && telSaisi && !telMembre.endsWith(telSaisi.slice(-6)) && !telSaisi.endsWith(telMembre.slice(-6))) {
      showErr(errEl, 'Numéro WhatsApp ne correspond pas à ce code.');
      return;
    }
  }

  // Connexion réussie
  MEMBRE_CONNECTE = membre;
  MODE_DECOUVERTE = false;
  sessionStorage.setItem('membre_session', JSON.stringify({id: membre.id}));
  ouvrirEspace();
}

function accesDecouverte() {
  MODE_DECOUVERTE = true;
  MEMBRE_CONNECTE = null;
  chargerDepuisCloud().then(function(){ ouvrirEspace(); });
}

function showErr(el, msg) {
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 4000);
}

function ouvrirEspace() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('header').style.display = 'block';
  document.getElementById('barre-membre').style.display = 'flex';
  mettreAJourHeader();
  mettreAJourBarreMembre();
  demarrerSyncAuto();

  // En mode découverte, pas d'onglet perso
  if (MODE_DECOUVERTE) {
    document.getElementById('nav-mondossier').style.display = 'none';
    document.getElementById('nav-calendrier').style.display  = 'none';
    document.getElementById('nav-macarte').style.display     = 'none';
    changerVue('classement');
  } else {
    changerVue('mondossier');
  }
}

function mettreAJourBarreMembre() {
  var barre = document.getElementById('barre-membre');
  if (!barre) return;
  if (MODE_DECOUVERTE) {
    barre.innerHTML = '<span style="color:var(--grisC)">👁 Accès public</span>'
      +'<button onclick="seDeconnecter()" style="background:none;border:none;color:var(--grisT);font-size:10px;cursor:pointer;font-family:inherit">← Quitter</button>';
  } else if (MEMBRE_CONNECTE) {
    var s = statutMembre(MEMBRE_CONNECTE);
    var c = {ajour:'var(--vert)',retard:'var(--or)',inactif:'var(--rouge)'}[s];
    barre.innerHTML = '<span style="color:'+c+'">👤 '+MEMBRE_CONNECTE.nom+'</span>'
      +'<div style="display:flex;gap:12px"><button onclick="chargerDepuisCloud().then(function(){afficherVue();notifier(\'✅ Données actualisées !\');})" style="background:none;border:none;color:var(--bleu);font-size:10px;cursor:pointer;font-family:inherit;font-weight:700">🔄 Actualiser</button><button onclick="seDeconnecter()" style="background:none;border:none;color:var(--grisT);font-size:10px;cursor:pointer;font-family:inherit">← Quitter</button></div>';
  }
}

function seDeconnecter() {
  if (syncTimer) clearInterval(syncTimer);
  MEMBRE_CONNECTE = null;
  MODE_DECOUVERTE = false;
  sessionStorage.removeItem('membre_session');
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('header').style.display = 'none';
  document.getElementById('barre-membre').style.display = 'none';
  document.getElementById('content').innerHTML = '';
  document.getElementById('login-code').value = '';
  document.getElementById('login-tel').value = '';
  // Ré-afficher tous les onglets
  ['nav-mondossier','nav-calendrier','nav-macarte'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.style.display = '';
  });
}

function changerVue(vue) {
  VUE_ACTUELLE = vue;
  ['mondossier','calendrier','classement','macarte'].forEach(function(v){
    var el = document.getElementById('nav-'+v);
    if (el) el.classList.toggle('active', v===vue);
  });
  afficherVue();
}

function afficherVue() {
  var c = document.getElementById('content');
  c.innerHTML = '';
  var div = document.createElement('div');
  div.className = 'anim-up';
  var map = {
    mondossier: vueDossier,
    calendrier:  vueCalendrier,
    classement:  vueClassement,
    global:      vueGlobal,
    macarte:     vueMaCarte
  };
  div.innerHTML = (map[VUE_ACTUELLE] || vueDossier)();
  c.appendChild(div);
  attacherEvents();
  if (VUE_ACTUELLE === 'macarte') setTimeout(genererQRCarte, 200);
}

  }).join('') : '<div style="color:var(--vert);text-align:center;padding:14px;font-size:13px">✅ Aucun retard !</div>';

      '<div class="grid-3" style="margin-bottom:16px">',
        [['Payés',payes,'var(--vert)'],['En retard',manq,'var(--rouge)'],['À venir',CFG.nb_mois-MC-1,'var(--grisC)']].map(function(x){

            +'<div style="color:'+x[2]+';font-weight:900;font-size:18px;margin-top:4px">'+x[1]+'</div>'

          '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--vertD);border-radius:3px;display:inline-block"></span> Payé</span>',
          '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--orD);border-radius:3px;display:inline-block"></span> Mois en cours</span>',
          '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--rougeD);border-radius:3px;display:inline-block"></span> Impayé</span>',
          '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:#111d2a;border-radius:3px;display:inline-block"></span> Futur</span>',
        '</div>',
        '<div style="display:flex;flex-wrap:wrap;gap:4px">'+cal+'</div>',

// VUE : CLASSEMENT
// ══════════════════════════════════════════════════════════
function vueClassement() {
  var MC = MOIS_COURANT();

  // Calcul scores
  var scores = MEMBRES.map(function(m){
    var payes = m.paiements.filter(function(p,i){ return p&&p!==0; }).length;
    var total = MC + 1;
    var taux  = total > 0 ? Math.round(payes/total*100) : 0;
    // Anonymiser : initiales seulement sauf pour le membre connecté
    var estMoi = MEMBRE_CONNECTE && m.id===MEMBRE_CONNECTE.id;
    var affichageNom = estMoi ? m.nom : anonymiserNom(m.nom);
    return { m: m, payes: payes, total: total, taux: taux, verse: payes*m.montant, affichageNom: affichageNom, estMoi: estMoi };
  });
  scores.sort(function(a,b){ return b.taux-a.taux || b.verse-a.verse; });

  var monRang = MEMBRE_CONNECTE ? scores.findIndex(function(s){ return s.m.id===MEMBRE_CONNECTE.id; }) : -1;
  var medalles = ['&#x1F947;','&#x1F948;','&#x1F949;'];

  var lignes = scores.map(function(sc,idx){
    var bg = sc.estMoi ? 'background:rgba(100,212,255,0.08);border-color:rgba(100,212,255,0.3);' : '';
    return '<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);margin-bottom:6px;'+bg+'">'
      +'<div style="font-size:'+(idx<3?'20px':'13px')+';min-width:28px;text-align:center;font-weight:900;color:var(--grisT)">'+(idx<3?medalles[idx]:(idx+1)+'e')+'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:13px;">'
          +sc.affichageNom
          +(sc.estMoi?' <span style="background:var(--bleuD);color:var(--bleu);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700">VOUS</span>':'')
        +'</div>'
        +'<div style="color:var(--grisC);font-size:10px;margin-top:2px">'+(sc.estMoi?sc.m.id+' · ':'')+sc.payes+'/'+sc.total+' mois</div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="color:'+(sc.taux>=100?'var(--vert)':sc.taux>=60?'var(--or)':'var(--rouge)')+';font-weight:900;font-size:16px">'+sc.taux+'%</div>'
        +(sc.estMoi?'<div style="color:var(--grisC);font-size:10px">'+fmt(sc.verse)+'</div>':'')
      +'</div>'
    +'</div>';
  }).join('');

  return [
    '<div class="card-bleu">',
      '<div style="color:var(--bleu);font-weight:800;font-size:15px;margin-bottom:4px">&#x1F3C6; Classement</div>',
      '<div style="color:var(--grisC);font-size:12px">'+CFG.nom_eglise+' · '+MEMBRES.length+' membres · Mois '+(MC+1)+'/'+CFG.nb_mois+'</div>',
      monRang>=0 ? '<div style="margin-top:10px;background:rgba(100,212,255,0.08);border:1px solid rgba(100,212,255,0.2);border-radius:10px;padding:10px 14px;color:var(--bleu);font-size:12px">Votre rang : <b style="font-size:16px">'+(monRang+1)+'e</b> sur '+MEMBRES.length+'</div>' : '',
      '<div style="margin-top:8px;font-size:10px;color:var(--grisT);font-style:italic">&#x1F512; Les noms des autres membres sont anonymises</div>',
    '</div>',
    '<div id="liste-classement" style="margin-top:10px">'+lignes+'</div>',
  ].join('');
}

function anonymiserNom(nom) {
  // Anonymisation maximale : juste "Membre #XXX" avec un numéro aléatoire stable
  // basé sur le nom (même numéro à chaque fois pour le même membre)
  var hash = 0;
  for (var i = 0; i < nom.length; i++) {
    hash = ((hash << 5) - hash) + nom.charCodeAt(i);
    hash = hash & hash;
  }
  var num = Math.abs(hash) % 9000 + 1000;
  return 'Membre #' + num;
}

            '<div style="color:var(--bleu);font-size:12px;font-family:monospace;font-weight:700;margin-top:2px">'+mFrais.id+'</div>',
          '</div>',
          badgeHTML(s),
        '</div>',
        '<div class="grid-3" style="gap:8px;margin-bottom:10px">',
          [['Cotisation',fmt(mFrais.montant)+'/mois','var(--bleu)'],
           ['Mois payes',payes+'/'+(MC+1),'var(--vert)'],
           ['Solde du',manq>0?fmt(manq*mFrais.montant):'Aucun',manq>0?'var(--or)':'var(--vert)']
          ].map(function(x){
            return '<div style="background:rgba(255,255,255,0.05);border-radius:8px;padding:8px">'
              +'<div style="color:var(--grisT);font-size:8px;font-weight:700;text-transform:uppercase">'+x[0]+'</div>'
              +'<div style="color:'+x[2]+';font-weight:700;font-size:11px;margin-top:2px">'+x[1]+'</div>'
            +'</div>';
          }).join(''),
        '</div>',
        '<div style="font-size:9px;color:var(--grisT);border-top:1px solid #1a3a5a;padding-top:6px">'+mFrais.id+(mFrais.tel?' · '+mFrais.tel:'')+'</div>',
      '</div>',
    '</div>',

    // ACTIONS
    '<div style="display:flex;gap:10px">',
      '<button class="btn btn-vert" style="flex:1;font-size:13px;padding:13px" onclick="imprimerMaCarte()">&#x1F5A8; Imprimer</button>',
      mFrais.tel ? '<a href="https://wa.me/'+formatWANumber(mFrais.tel)+'" target="_blank" class="btn btn-ghost" style="flex:1;text-decoration:none;font-size:13px;padding:13px">&#x1F4F2; WhatsApp</a>' : '',
    '</div>',
    '<div style="text-align:center;color:var(--grisT);font-size:11px;margin-top:12px">Code QR valable pour scanner par le comite</div>',
  ].join('');
}

function genererQRCarte() {
  var m = MEMBRE_CONNECTE;
  if (!m) return;
  var mFrais = MEMBRES.find(function(x){ return x.id===m.id; }) || m;
  var qrText = 'TEMPLE|'+mFrais.id+'|'+mFrais.nom+'|'+mFrais.montant;
  // QR code en 200px pour meilleure lisibilité
  afficherQRCode('qr-macarte', qrText, 200);
}

function genererQRCodeFallback(el, mFrais, qrText) {
  afficherQRFallback(el, qrText, 94);
}

function imprimerMaCarte() {
  var m = MEMBRE_CONNECTE;
  if (!m) return;
  var mFrais = MEMBRES.find(function(x){ return x.id===m.id; }) || m;
  var s = statutMembre(mFrais);
  var MC = MOIS_COURANT();
  var payes = mFrais.paiements.filter(function(p,i){ return p&&p!==0; }).length;
  var manq  = mFrais.paiements.filter(function(p,i){ return !p&&i<=MC; }).length;
  var strip = {ajour:'linear-gradient(90deg,#0d5c3a,#4eff9b)',retard:'linear-gradient(90deg,#5c3a0d,#ffb347)',inactif:'linear-gradient(90deg,#5c0d0d,#ff6b6b)'};
  var colors = {ajour:'#4eff9b',retard:'#ffb347',inactif:'#ff6b6b'};
  var logoH = LOGO_DATA?'<img src="'+LOGO_DATA+'" style="width:22px;height:22px;border-radius:4px;object-fit:cover"/>'
    :'<div style="width:22px;height:22px;border-radius:4px;background:#1a3a5a;display:flex;align-items:center;justify-content:center;font-size:12px">⛪</div>';
  var cal = mFrais.paiements.map(function(p,idx){
    var ec=idx===MC,pas=idx<=MC;
    return '<div style="width:5px;height:5px;border-radius:1px;background:'+(p?'#0d5c3a':ec?'#5c3a0d':pas?'#5c0d0d':'#1a2a3a')+'"></div>';
  }).join('');
  var qrId = 'qrprint-macarte';
  var html = '<div style="width:85mm;height:54mm;background:linear-gradient(135deg,#0a1628,#0f2030);border:1px solid #1a3a5a;border-radius:8px;overflow:hidden;font-family:Segoe UI,sans-serif;display:inline-block">'
    +'<div style="height:4px;background:'+strip[s]+'"></div>'
    +'<div style="padding:6px 8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">'
        +logoH
        +'<div style="font-size:6px;color:#334455;font-weight:700;text-transform:uppercase;flex:1;margin:0 4px;padding-top:4px">'+CFG.nom_eglise+'<br/>'+CFG.nom_projet+'</div>'
        +'<div id="'+qrId+'" style="background:white;padding:3px;border-radius:4px"></div>'
      +'</div>'
      +'<div style="font-weight:900;font-size:11px;color:#ddeeff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px">'+mFrais.nom+'</div>'
      +'<div style="font-size:8px;color:#64d4ff;margin-bottom:4px">'+mFrais.id+' · <span style="color:'+colors[s]+'">'+(s==='ajour'?'À jour':s==='retard'?'En retard':'Inactif')+'</span></div>'
      +'<div style="display:flex;gap:4px;margin-bottom:3px">'
        +'<div style="background:rgba(255,255,255,0.05);border-radius:3px;padding:2px 4px;flex:1"><div style="font-size:5px;color:#556677;font-weight:700;text-transform:uppercase">Cotisation</div><div style="font-size:7px;font-weight:700;color:#64d4ff">'+fmt(mFrais.montant)+'/mois</div></div>'
        +'<div style="background:rgba(255,255,255,0.05);border-radius:3px;padding:2px 4px;flex:1"><div style="font-size:5px;color:#556677;font-weight:700;text-transform:uppercase">Mois payés</div><div style="font-size:7px;font-weight:700;color:#4eff9b">'+payes+'/'+(MC+1)+'</div></div>'
        +'<div style="background:rgba(255,255,255,0.05);border-radius:3px;padding:2px 4px;flex:1"><div style="font-size:5px;color:#556677;font-weight:700;text-transform:uppercase">Solde dû</div><div style="font-size:7px;font-weight:700;color:'+(manq>0?'#ffb347':'#4eff9b')+'">'+(manq>0?fmt(manq*mFrais.montant):'0 F')+'</div></div>'
      +'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:1px;margin-top:2px">'+cal+'</div>'
      +'<div style="font-size:6px;color:#334455;margin-top:3px;padding-top:2px;border-top:1px solid #1a3a5a">'+mFrais.id+(mFrais.tel?' · '+mFrais.tel:'')+'</div>'
    +'</div>'
  +'</div>';

  var zone = document.getElementById('print-zone');
  zone.innerHTML = '<div style="padding:5mm">'+html+'</div>';
  setTimeout(function(){
    var el = document.getElementById(qrId);
    if (el && window.QRCode) {
      el.innerHTML='';
      try { new QRCode(el,{text:'TEMPLE|'+mFrais.id+'|'+mFrais.nom+'|'+mFrais.montant,width:52,height:52,colorDark:'#0a1628',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M}); }
      catch(e){}
    }
    setTimeout(function(){ window.print(); }, 400);
  }, 100);
}

if('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
document.addEventListener('DOMContentLoaded', function() {
  // Navigation
  ['mondossier','calendrier','classement','macarte'].forEach(function(v){
    var el = document.getElementById('nav-'+v);
    if (el) el.addEventListener('click', function(){ changerVue(v); });
  });

  // Login
  document.getElementById('login-code').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('login-tel').focus(); });
  document.getElementById('login-tel').addEventListener('keydown',  function(e){ if(e.key==='Enter') tentativeConnexionMembre(); });
  document.getElementById('login-code').addEventListener('input',   function(){ this.value=this.value.toUpperCase(); });

  LOGO_DATA = LOGO_DATA_DEFAULT;
  mettreAJourLogoUI();
  // Charger données cloud en arrière-plan au démarrage
  chargerDepuisCloud();

  // Restaurer session
  var sess = sessionStorage.getItem('membre_session');
  if (sess) {
    try {
      var data = JSON.parse(sess);
      chargerDepuisCloud().then(function(){
        var m = MEMBRES.find(function(x){ return x.id===data.id; });
        if (m) { MEMBRE_CONNECTE = m; MODE_DECOUVERTE = false; ouvrirEspace(); }
      });
    } catch(e) { sessionStorage.removeItem('membre_session'); }
  }
});
</script>
